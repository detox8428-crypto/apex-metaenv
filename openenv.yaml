spec_version: 1
name: apex-engineering-benchmark
version: "3.0.0"
description: >
  Multi-turn RL benchmark for real engineering tasks.
  Agents debug production incidents, review code, and fix data pipelines
  across 3 domains and 9 tasks with partial-credit rewards.
type: rl-environment
runtime: docker
app_file: app.py
port: 7860
tags:
  - openenv
  - reinforcement-learning
  - engineering
  - real-world
  - rl-benchmark
tasks:
  - id: easy-solve-001
    difficulty: easy
    domain: data_pipeline
  - id: medium-solve-001
    difficulty: medium
    domain: data_pipeline
  - id: hard-solve-001
    difficulty: hard
    domain: data_pipeline
  - id: cr-easy-001
    difficulty: easy
    domain: code_review
  - id: cr-medium-001
    difficulty: medium
    domain: code_review
  - id: cr-hard-001
    difficulty: hard
    domain: code_review
  - id: id-easy-001
    difficulty: easy
    domain: incident_debug
  - id: id-medium-001
    difficulty: medium
    domain: incident_debug
  - id: id-hard-001
    difficulty: hard
    domain: incident_debug
