version: '3.9'

services:
  apex-api:
    build:
      context: .
      dockerfile: Dockerfile.apex.standalone
    container_name: apex-api-server
    ports:
      - "8000:8000"
    environment:
      # Email configuration (optional - leave empty for simulation mode)
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      GMAIL_EMAIL: ${GMAIL_EMAIL:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      OUTLOOK_EMAIL: ${OUTLOOK_EMAIL:-}
      OUTLOOK_PASSWORD: ${OUTLOOK_PASSWORD:-}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_EMAIL: ${SMTP_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      
      # API configuration
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      MODEL_NAME: "gpt-3.5-turbo"
    
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    networks:
      - apex-network
    
    labels:
      - "com.example.description=APEX Environment API Server"
      - "com.example.version=1.0"

networks:
  apex-network:
    driver: bridge

volumes:
  logs:
  data:
