# APEX Environment - Standalone Docker Compose Configuration
# This compose file is isolated for APEX and does not affect other projects

version: '3.9'

services:
  apex-environment:
    build:
      context: .
      dockerfile: Dockerfile.apex
      args:
        - BUILDKIT_INLINE_CACHE=1
    
    container_name: apex-environment-server
    
    image: apex-environment:latest
    
    ports:
      - "8000:8000"
    
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LOG_LEVEL=info
      - APEX_ENV=docker
    
    volumes:
      - apex-logs:/apex/logs
      - ./apex_env:/apex/apex_env
    
    working_dir: /apex
    
    command: python run_server.py
    
    restart: unless-stopped
    
    networks:
      - apex-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    labels:
      project: "apex-environment"
      environment: "production"

volumes:
  apex-logs:
    driver: local

networks:
  apex-network:
    driver: bridge
    name: apex-network

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# Build and run APEX Environment in Docker:
#
#   docker-compose -f docker-compose.apex.yml up -d
#
# View logs:
#
#   docker-compose -f docker-compose.apex.yml logs -f
#
# Stop the service:
#
#   docker-compose -f docker-compose.apex.yml down
#
# Remove all volumes:
#
#   docker-compose -f docker-compose.apex.yml down -v
#
# Check running containers:
#
#   docker-compose -f docker-compose.apex.yml ps
#
# Access API documentation:
#
#   http://localhost:8000/docs
#
# ============================================================================
